      <div class="container">
        <a class="navbar-brand" href="index.html">SmartPhone Hub</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>

            <li class="nav-item">

    <section class="container my-5">
      <h1 class="text-center">Our Phones</h1>
      <input
        type="text"
        id="search"
        class="form-control mb-4"
        placeholder="Search phone"
        onkeyup="searchPhone()"
      />
      <div class="row mt-4">
        <div class="col-md-4 phone-card">
          <div class="card">
            <img
              src="images/iphone17.jpg"
              class="card-img-top"
              alt="iPhone 17"
            />

            <div class="card-body">
              <h5 class="card-title">iPhone 17</h5>
              <p class="card-text">KSh 165,000</p>

              <button class="btn btn-primary">Buy Now</button>
            </div>
          </div>
        </div>

        <div class="col-md-4 phone-card">
          <div class="card">
            <img
              src="images/galaxys25.jpg"
              class="card-img-top"
              alt="Galaxy S25"
            />

            <div class="card-body">
              <h5 class="card-title">Samsung Galaxy S25</h5>
              <p class="card-text">KSh 120,000</p>

              <button class="btn btn-primary">Buy Now</button>
            </div>
          </div>
        </div>

        <div class="col-md-4 phone-card">
          <div class="card">
            <img src="images/pixel10.jpg" class="card-img-top" alt="Pixel 10" />

            <div class="card-body">
              <h5 class="card-title">Google Pixel 10</h5>
              <p class="card-text">KSh 110,000</p>

              <button class="btn btn-primary">Buy Now</button>
            </div>
          </div>
