    <!-- Buy Section -->
<section class="container my-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-lg border-0 p-4">

                <h1 class="text-center mb-2">
                    Buy Your Phone
                </h1>

                <p class="text-center text-muted mb-4">
                    Complete the form below to place your order.
                </p>

                <form onsubmit="return validateForm()">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input
                                type="text"
                                id="name"
                                class="form-control"
                                placeholder="Enter your full name">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                type="email"
                                id="email"
                                class="form-control"
                                placeholder="Enter your email">

                        </div>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Phone Model
                        </label>

                        <select class="form-select">

                            <option>iPhone 17</option>
                            <option>Samsung Galaxy S25</option>
                            <option>Google Pixel 10</option>
                            <option>Tecno Camon 40</option>
                            <option>Infinix Note 50</option>

                        </select>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Quantity
                            </label>

                            <input
                                type="number"
                                class="form-control"
                                value="1"
                                min="1">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Delivery Date
                            </label>

                            <input
                                type="date"
                                class="form-control">

                        </div>

                    </div>

                    <div class="d-grid mt-4">

                        <button
                            type="submit"
                            class="btn btn-primary btn-lg">

                            Place Order

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</section>

          </div>

          
    </section>
